{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block content %}

<div class="mt-20">
<form action="/signup" method="post">

        <label>Username</label>
        <input type="text" name="username">

        <label>Password</label>
        <input type="password" name="password">

        <button type="submit">
            Signup
        </button>

</form>
</div>

{% endblock %}
