<aside
    id="sidebar"
    class="fixed top-0 left-0 z-50 h-screen w-72
           -translate-x-full
           bg-sky-50/90
           mt-25
           rounded-2xl
           backdrop-blur-md
        
           border-r border-white/60
           shadow-xl
           transition-transform duration-300 ease-in-out"
>

    <!-- Header -->
    <div class="flex items-center justify-between border-b border-sky-100 px-6 py-5">

        <h2 class="text-lg font-semibold text-slate-700">
            Echo Script
        </h2>

        <button
            id="close-sidebar"
            class="rounded-lg p-2 text-xl text-slate-600 transition hover:bg-white hover:text-red-500"
        >
            ✕
        </button>

    </div>

    <!-- Menu -->
    <div class="px-4 py-6">

        <button
            class="mb-6 w-full rounded-xl bg-indigo-600 py-3 text-white transition hover:bg-indigo-700"
        >
            + New Recording
        </button>

        <ul class="space-y-2">

            <li class="cursor-pointer rounded-xl px-4 py-3 text-slate-700 transition hover:bg-white">
                📅 Today's Recordings
            </li>

            <li class="cursor-pointer rounded-xl px-4 py-3 text-slate-700 transition hover:bg-white">
                🕒 Yesterday
            </li>

            <li class="cursor-pointer rounded-xl px-4 py-3 text-slate-700 transition hover:bg-white">
                📂 Older
            </li>

        </ul>

    </div>

</aside>
